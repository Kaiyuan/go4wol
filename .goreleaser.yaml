# .goreleaser.yaml
version: 2

project_name: go4wol

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    # 注意：sqlite3 需要 CGO。在 goreleaser 中编译多平台 CGO 可能需要交叉编译链。
    # 如果环境不支持多平台 CGO 编译，goreleaser 可能会报错。
    # 这里我们主要面向 Linux 提供多架构二进制。

archives:
  - format: tar.gz
    # 为 windows 创建 zip 存档
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: Kaiyuan
    name: go4wol
